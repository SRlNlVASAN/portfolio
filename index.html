<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Engineer Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <header>
            <div class="profile-img">
                <!-- Replace with your image in assets folder -->
                <img src="assets/profile.jpg" alt="Profile Picture">
            </div>
            <h1>Data Engineer</h1>
            <p class="subtitle">SQL Developer transitioning to Data Engineering</p>
        </header>

        <section class="links">
            <a href="https://linkedin.com/in/yourprofile" target="_blank" class="btn">LinkedIn</a>
            <a href="https://github.com/yourusername" target="_blank" class="btn">GitHub</a>
            <a href="assets/resume.pdf" target="_blank" class="btn">Download Resume</a>
        </section>

        <section class="projects">
            <h3>Featured Projects</h3>
            <div class="project-card">
                <h4>Pipeline Migration</h4>
                <p>SQL/SSIS to Python & AWS S3.</p>
            </div>
            <div class="project-card">
                <h4>ScanAI Backend</h4>
                <p>AI-powered image delivery architecture.</p>
            </div>
        </section>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
